name: zussgo
description: Together We Go
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2

  # Navigation
  go_router: ^17.1.0

  # State Management
  flutter_riverpod: ^3.3.1

  # Backend
  supabase_flutter: ^2.5.0

  # HTTP
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Icons
  flutter_svg: ^2.0.0

  # Google Fonts
  google_fonts: ^8.0.2

  # Animations
  flutter_animate: ^4.5.0

  # Image Handling
  cached_network_image: ^3.3.0
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  geolocator: ^14.0.2

  # Sharing
  share_plus: ^10.1.0
  screenshot: ^3.0.0
  path_provider: ^2.1.4

  flutter_phone_direct_caller: ^2.2.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/destinations/
