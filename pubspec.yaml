name: zussgo
description: Together We Go
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0

  # Backend
  supabase_flutter: ^2.5.0

  # HTTP
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Icons
  flutter_svg: ^2.0.0

  # Google Fonts
  google_fonts: ^6.2.0

  # Animations
  flutter_animate: ^4.5.0

  # Image Handling
  cached_network_image: ^3.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true